name: Deploy to Vultr

on:
  push:
    branches:
      - master
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/clearprice || { echo "Error: /opt/clearprice not found. Run setup-vultr.sh first."; exit 1; }

            # Pull latest code
            if [ -d .git ]; then
              git fetch origin master
              git checkout master
              git reset --hard origin/master
            else
              git clone https://github.com/gopalakrishnans/myrepo.git .
              git checkout master
            fi

            # Determine compose command (V2 plugin preferred, fallback to V1 standalone)
            if docker compose version > /dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose > /dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "Installing docker-compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              DC="docker-compose"
            fi
            echo "Using compose command: $DC"

            # Kill any container using port 80 before starting
            docker ps -q --filter "publish=80" | xargs -r docker rm -f
            # Build and restart containers
            $DC down --remove-orphans
            docker network rm clearprice_default 2>/dev/null || true
            $DC build --no-cache
            $DC up -d
