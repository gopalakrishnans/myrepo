name: Deploy to Vultr

on:
  push:
    branches:
      - master
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/healthcare-app || mkdir -p /opt/healthcare-app && cd /opt/healthcare-app

            # Clone or pull latest code from master
            if [ -d .git ]; then
              git fetch origin
              git checkout master
              git pull origin master
            else
              git clone https://github.com/gopalakrishnans/myrepo.git .
              git checkout master
            fi

            # Kill any container using port 80 before starting
            docker ps -q --filter "publish=80" | xargs -r docker stop
            # Build and restart containers
            docker-compose down --remove-orphans
            docker-compose build --no-cache
            docker-compose up -d
