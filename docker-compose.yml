services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    volumes:
      - db-data:/app/data
    expose:
      - "8000"
    environment:
      - ADMIN_SECRET=${ADMIN_SECRET:-}

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
